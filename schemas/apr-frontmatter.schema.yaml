# APR Frontmatter Schema (JSON Schema, expressed in YAML).
#
# Every file under principles/ MUST begin with YAML frontmatter conforming to
# this schema. Validators (planned under tools/) consume this file as input.

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/promptarch/promptarch/blob/main/schemas/apr-frontmatter.schema.yaml
title: APR Frontmatter
type: object
description: >
  Frontmatter required at the top of every Architectural Principle Record (APR).
additionalProperties: false
required:
  - apr
  - title
  - abstract
  - status
  - version
  - principals
  - created
  - last-updated
  - audience
  - supersedes
  - superseded-by
  - related
  - tags
# generative-contributors is OPTIONAL — see field description below.
properties:
  apr:
    description: >
      Numeric APR identifier. Monotonically increasing across the project,
      never reused. Filename is derived as APR-NNN-<slug>.md with NNN zero-padded.
      APR-000 is reserved for the project's foundational position statement
      (see meta/apr-numbering.md); APR-001 onward are normal principle records.
    type: integer
    minimum: 0
  title:
    description: >
      Full title as it should appear in citations. Conventionally:
      "MNEMONIC — Descriptive subtitle".
    type: string
    minLength: 1
  abstract:
    description: >
      One- to two-sentence summary of the principle, for discovery and
      citation previews: what the APR is about and why one would adopt it.
      Descriptive, not normative — the normative one-line statement lives in
      the body. Distinct from `audience` (who it is for) and from the
      component-level `description` field that ASPECT/OBSERVE define for
      skills and agents. Plain text (rendered as YAML, not Markdown).
    type: string
    minLength: 1
    maxLength: 300
  status:
    description: APR lifecycle state. See meta/apr-statuses.md for transitions.
    type: string
    enum:
      - Draft
      - Proposed
      - Accepted
      - Deprecated
      - Superseded
      - Withdrawn
  version:
    description: >
      Semantic version of the APR. Pre-Accepted versions use 0.x; first
      Accepted version is conventionally 1.0.0.
    type: string
    pattern: '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$'
  principals:
    description: >
      One or more principals of the APR. A principal is the entity that
      defines the work's intent, governs its creation, validates its content,
      and assumes responsibility for its publication. At least one is
      required; principals are the citable, accountable signatories.
      Generation of the content may be performed by humans, AI systems, or
      both — that orthogonal axis is recorded in generative-contributors.
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  generative-contributors:
    description: >
      Optional list of generative (typically LLM-based) systems that
      materially contributed to producing the APR's content. Kept distinct
      from `principals:` so the accountability axis (who is responsible) and
      the generation axis (what produced the text) stay separable, grep-able,
      and auditable. A generative contributor is not a principal and is not
      an author — it generates content under a principal's direction.

      Conventional format is `"<Model Name> <Version> (<Provider>)"`, e.g.
      `"Claude Opus 4.7 (Anthropic)"` or `"GPT-5 (OpenAI)"`. Principals MAY
      append additional qualifiers when reproducibility matters — context
      window, deployment tier, or the canonical model ID — e.g.
      `"Claude Opus 4.7 (Anthropic; model ID claude-opus-4-7)"`.

      The field is optional: omit it if no generative system materially
      contributed. Trivial assistance (typo fixes, formatting suggestions)
      does not need to be recorded.
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  created:
    description: ISO date the APR was first opened as a draft.
    type: string
    format: date
  last-updated:
    description: ISO date of the most recent semantic update.
    type: string
    format: date
  audience:
    description: One-line description of who this APR is written for.
    type: string
    minLength: 1
  supersedes:
    description: >
      APR IDs (e.g., "APR-001") this APR replaces. Empty list if none.
    type: array
    items:
      type: string
      pattern: '^APR-\d{3,}$'
  superseded-by:
    description: >
      APR IDs that supersede this one. Empty list if none. Populated when
      status transitions to Superseded.
    type: array
    items:
      type: string
      pattern: '^APR-\d{3,}$'
  related:
    description: >
      APR IDs related (but neither superseding nor superseded). Used for
      cross-discovery; ordering is not significant.
    type: array
    items:
      type: string
      pattern: '^APR-\d{3,}$'
  tags:
    description: >
      Free-form keywords for discovery and grouping. Kebab-case preferred.
    type: array
    items:
      type: string
      minLength: 1

# Cross-field rules expressed as JSON Schema conditionals.
#
# Rule: when status is Superseded, superseded-by MUST be non-empty.
allOf:
  - if:
      properties:
        status:
          const: Superseded
    then:
      properties:
        superseded-by:
          minItems: 1
