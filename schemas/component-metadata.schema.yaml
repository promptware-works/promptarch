# Component Metadata Registry Schema (JSON Schema, expressed in YAML).
#
# Validates registries/component-metadata.yaml — the authoritative list of canonical
# frontmatter metadata fields for promptware components. Governed by APR-014 DECLARE
# (§ The metadata registry). The zero-dependency checker tools/registry/check-registry.ts
# enforces the key structural + semantic constraints below in CI.

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/promptware-works/promptarch/blob/main/schemas/component-metadata.schema.yaml
title: Component Metadata Registry
type: object
additionalProperties: false
required:
  - registry_version
  - namespaces
  - fields
properties:
  registry_version:
    description: Schema/format version of the registry file itself.
    type: integer
    minimum: 1
  namespaces:
    description: >
      The L1 sections directly under a component's top-level `metadata` object. Each is
      a subsystem/consumer section; `core` is required (DECLARE's cross-cutting clusters),
      others (e.g. `observe`) are opt-in and subsystem-owned.
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [name, owner, required]
      properties:
        name:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
        owner:
          type: string
          pattern: '^APR-\d{3,}$'
        required:
          type: boolean
        clusters:
          description: L2 scope groups within this namespace.
          type: array
          items:
            type: string
            pattern: '^[a-z][a-z0-9_]*$'
  fields:
    description: >
      Canonical fields. Each is owned by exactly one APR and addressed by a dotted `path`
      under `metadata` (namespace, optionally .cluster). The full key `path + "." + name`
      MUST be unique. Registered by the owning APR's "Metadata registrations" section,
      never by editing APR-014.
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [name, path, owner, type, status]
      properties:
        name:
          description: Frontmatter field name (snake_case), the leaf of the path.
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
        path:
          description: >
            Dotted path to the field's parent under `metadata` — `<namespace>` or
            `<namespace>.<cluster>`. E.g. `core.classification`, `observe.consumes`,
            `observe` (loose field).
          type: string
          pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)*$'
        owner:
          description: The single owning APR.
          type: string
          pattern: '^APR-\d{3,}$'
        type:
          type: string
          enum: [enum, list, ref-list, object, string, number, boolean]
        values:
          description: Permitted values (for enum-typed fields).
          type: array
        status:
          type: string
          enum: [active, provisional, deprecated, reserved]
        since:
          description: Free-form provenance, e.g. "APR-003 0.1.5".
          type: string
