# Artifact Graph Config
#
# The project-level schema + scan rules for the append-only, typed artifact graph.
# Governed by APR-013 (An Artifact-Graph Principle for Promptware). This is a SIBLING
# of the component-metadata registry (registries/component-metadata.yaml, APR-014):
# that one lists a component's frontmatter fields; this one declares the graph's
# vocabulary (node/edge types) and what the graph kernel scans.
#
# Rules (enforced by tools/graph/check-graph.ts):
#   - node-types and edge-types are non-empty; each name is a lowercase slug.
#   - every `roots` entry is a declared node-type (roots are the graph entry points
#     exempt from the no-orphan rule; ids MAY be added but the seed uses types).
#   - include/ignore are non-empty glob lists.
#
# See APR-013 §The artifact-graph config, and docs/studies/metadata-extensibility.md
# for the registry pattern (RFC-8126-style).

version: 1

# node types allowed in this project (a component's `code` node = APR-001 ASPECT
# components + APR-002 OBSERVE content). Each node's version/status/lineage is APR-008.
# `container` is the optional graph-owning scope node (APR-013 §Containers and scope);
# its payload is the container manifest (APR-019).
node-types: [container, intent, requirement, decision, study, design, code, test, deploy-spec, run-log]

# edge types: direction is implied by the type. The (optional) object per type MAY later
# constrain allowed source/target node types, e.g. `satisfies: { from: [code], to: [requirement] }`,
# without a schema change.
edge-types:
  part-of:      {}          # containment: a child container -> its parent container (APR-013/APR-019)
  derives-from: {}
  satisfies:    {}
  verifies:     {}
  justified-by: {}
  informed-by:  {}
  supersedes:   {}          # derived from core.provenance.supersedes (APR-008), recorded as a graph edge
  depends-on:   {}
  contradicts:  {}

# attributes every node declares in its own frontmatter. `id`, `type`, `title` are the
# mandatory node identity; provenance (version, status, supersedes) is reused from
# core.provenance (APR-008), not redefined here; edges reference the edge-types above.
node-attributes:
  id:           { required: true }     # local, container-unique, immutable node id
  container-id: { required: true }     # innermost container's id (APR-019); global id = container-id:id
  type:         { required: true }     # one of node-types
  title:        { required: true }     # human-readable name
  description:  { required: false }    # short summary
  edges:        { required: false }    # outbound typed edges: { <edge-type>: [<node-id>, …] }

# node-types (or ids) exempt from the no-orphan rule — the graph's entry points.
roots: [intent]

# globs the graph kernel scans / ignores.
include: ["**/*.md"]
ignore:  ["node_modules/**", "tmp/**"]
