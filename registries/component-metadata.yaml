    type: ref-list
    status: active
    since: "APR-002 0.1.0"
  - name: policies
    path: observe.consumes
    owner: APR-002
    type: ref-list
    status: active
    since: "APR-002 0.1.0"
  - name: contracts
    path: observe.consumes
    owner: APR-002
    type: ref-list
    status: active
    since: "APR-002 0.1.0"
  - name: examples
    path: observe.consumes
    owner: APR-002
    type: ref-list
    status: active
    since: "APR-002 0.1.0"
  - name: counter_examples
    path: observe.consumes
    owner: APR-002
