# Component Metadata Registry
#
# The authoritative list of CANONICAL frontmatter metadata fields for promptware
# components (skills, agents, prompts). Governed by APR-014 DECLARE.
#
# Address model — every field has a dotted PATH under the top-level `metadata` object:
#     metadata.<namespace>.<cluster>.<field>
# A `namespace` (L1) is a subsystem/consumer section; a `cluster` (L2) is a scope group
# within it; the `field` (L3) is the leaf. A namespace may also hold LOOSE fields
# directly (path = just the namespace, no cluster), e.g. `observe.safety_critical`.
#   - `core`   — REQUIRED namespace, DECLARE's cross-cutting clusters; fields owned by
#                their respective principles.
#   - `observe`— OPT-IN namespace owned by APR-002 (present only on OBSERVE consumers).
#
# Rules (enforced by tools/registry/check-registry.ts):
#   - a field's `path` first segment MUST be a declared namespace; a 2nd segment MUST be
#     a declared cluster of that namespace.
#   - the full key `path + name` MUST be unique (so consumes.contracts != produces.contracts).
#   - a field is added HERE by the APR that owns it (via its "Metadata registrations"
#     section) — never by editing APR-014 or another APR.
#   - non-owned / platform-specific fields are NOT registered: they live under `metadata`
#     as namespaced custom keys (e.g. `x-<vendor>-*`), un-governed by the corpus.
#   - `status`: active | provisional | deprecated | reserved.
#
# See docs/studies/metadata-extensibility.md for rationale and prior art (RFC 8126).

registry_version: 2

namespaces:
  - name: core
    owner: APR-014            # governed by DECLARE; clusters/fields owned by their principles
    required: true
    clusters: [classification, operability, provenance, evaluation, composition]
  - name: observe
    owner: APR-002
    required: false
    clusters: [consumes, produces, evals]

fields:
  # ---------- core.classification ----------
  - name: exec_form
    path: core.classification
    owner: APR-003
    type: enum
    values: [code, prompt]
    status: active
    since: "APR-003 0.1.5"
  - name: skill_kind
    path: core.classification
    owner: APR-007
    type: enum
    values: [capability, pattern]
    status: active
    since: "APR-007 0.1.1"
  - name: trust_level
    path: core.classification
    owner: APR-005
    type: enum
    values: [trusted, semi-trusted, untrusted]
    status: active
    since: "APR-005 0.1.0"
  - name: permission_tier
    path: core.classification
    owner: APR-022
    type: enum
    values: [read, write, destructive]
    status: active
    since: "APR-022 0.1.0"
  - name: agency
    path: core.classification
    owner: APR-006
    type: enum
    values: [leaf, coordinator]
    status: active
    since: "APR-006 0.1.0"
  - name: max_autonomy_level
    path: core.classification
    owner: APR-009
    type: enum
    values: [L1, L2, L3, L4, L5]
    status: active
    since: "APR-014 0.2.2"
  - name: max_blast_radius
    path: core.classification
    owner: APR-009
    type: enum
    values: [local-only, project-scoped, cross-project, external]
    status: active
    since: "APR-014 0.2.2"

  # ---------- core.composition ----------
  - name: applies_patterns
    path: core.composition
    owner: APR-007
    type: list
    status: active
    since: "APR-007 0.1.0"
  - name: delegation_envelope
    path: core.composition
    owner: APR-006
    type: object
    status: active
    since: "APR-006 0.1.0"
  - name: escalation_triggers
    path: core.composition
    owner: APR-009
    type: list
    status: active
    since: "APR-014 0.2.2"
  - name: escalation_path
    path: core.composition
    owner: APR-009
    type: string
    status: active
    since: "APR-014 0.2.2"

  # ---------- core.evaluation ----------
  - name: model_pin
    path: core.evaluation
    owner: APR-008
    type: string
    status: active
    since: "APR-008 0.1.0"

  # ---------- core.provenance ----------
  - name: version
    path: core.provenance
    owner: APR-008
    type: string
    status: active
    since: "APR-008 0.1.0"
  - name: supersedes
    path: core.provenance
    owner: APR-008
    type: string
    status: active
    since: "APR-001 0.3.1"
  - name: principals
    path: core.provenance
    owner: APR-010
    type: list
    status: active
    since: "APR-010 0.1.0"
  - name: status
    path: core.provenance
    owner: APR-010
    type: enum
    values: [Draft, Stable, Deprecated]
    status: active
    since: "APR-010 0.1.0"

  # ---------- core.operability ----------
  - name: trace_anchor
